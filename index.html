<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра Лила</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <h1>Игра Лила</h1>
        <input type="file" id="upload-map" accept="image/*" />
        <div id="game-container">
            <div id="video-chat-leader">
                <iframe src="https://meet.jit.si/lila-leader" allow="camera; microphone" style="width: 100%; height: 100%;"></iframe>
            </div>
            <div id="game-board">
                <!-- Игровое поле -->
            </div>
            <div id="video-chat-player">
                <iframe src="https://meet.jit.si/lila-player" allow="camera; microphone" style="width: 100%; height: 100%;"></iframe>
            </div>
        </div>
        <div id="dice-container">
            <button id="roll-dice">Бросить кубик</button>
            <div id="dice-result"></div>
        </div>
        <div id="notification"></div>
    </div>
    <script src="script.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
    <script>
        // Инициализация Firebase
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Инициализация приложения
        const app = firebase.initializeApp(firebaseConfig);
    </script>
</body>
</html>
